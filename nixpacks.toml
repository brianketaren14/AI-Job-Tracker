# Nixpacks configuration untuk Railway
# Reference: https://nixpacks.com/

[build]
# Explicitly set Python version
pythonVersion = "3.11"

# Install system dependencies jika diperlukan
[build.inputs]
packages = ["bash", "curl"]

# Build commands
[build.commands]
install = "pip install --no-cache-dir -r requirements.txt"

[run]
# Set environment variables
env = { PYTHONUNBUFFERED = "1", FLASK_ENV = "production" }

# Start command
cmd = "bash start.sh"

# Health check endpoint
healthCheckCmd = "curl -f http://localhost:$PORT/api/analytics/summary || exit 1"

# Ports
ports = [8000]
